# test-policy.yml
policies:
  - name: s3-use-existing-key-test
    resource: s3
    filters:
      - Name: custodian-test-use-existing-key
      - type: bucket-encryption
        state: true
        crypto: aws:kms
      - type: bucket-encryption
        bucket_key_enabled: false
    actions:
      - type: set-bucket-encryption
        crypto: aws:kms
        use-existing-key: true
        bucket-key: true
